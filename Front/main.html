<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poke API</title>

<style>
*{ 
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:"Inter","Segoe UI",Arial,sans-serif;
    background-color:#f4f5f7;
    color:#2c2c2c;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    background-color:#ffffff;
    padding:0 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

header h2{
    font-size:18px;
    font-weight:600;
    color:#480A23;
}

.add-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background-color:#480A23;
    color:#ffffff;
    font-size:24px;
    border:none;
}

.add-btn:hover{
    background-color:#ac2218;
}

.tasks-container{
    padding:100px 32px 80px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:24px;
}

.Task-tag{
    background-color:#ffffff;
    border-radius:10px;
    padding:28px 24px;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.Task-tag:hover{
    transform:translateY(-4px);
}

.Task-tag h2{
    font-size:16px;
    font-weight:500;
    color:#333333;
    text-align:center;
}

footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background-color:#ffffff;
    text-align:center;
    padding:10px;
    font-size:13px;
    color:#000000;
}
</style>
</head>

<body>

<header>
<h2>Gestión de Proyectos</h2>
<a href="proyecto.html">
<button class="add-btn">+</button>
</a>
</header>

<div class="tasks-container" id="pokemon-container"></div>

<script src="pokemon.js"></script>

<footer>
Angela Rodriguez Garza
</footer>

</body>
</html>
